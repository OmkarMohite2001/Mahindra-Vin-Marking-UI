<div class="engrave-loader-overlay">
  <div class="engrave-loader-card">
    <div class="engrave-circuit-bg"></div>

    <div class="engrave-loader-container">
      <svg viewBox="0 0 600 120">
        <text x="50%" y="65%" text-anchor="middle" class="text-base">{{ displayText }}</text>
        <text x="50%" y="65%" text-anchor="middle" class="text-circuit">{{ displayText }}</text>
        <text x="50%" y="65%" text-anchor="middle" class="text-glitch">{{ displayText }}</text>
        <text x="50%" y="65%" text-anchor="middle" class="text-fill">{{ displayText }}</text>
      </svg>

      <div class="engrave-progress-container">
        <div class="engrave-progress-bar"></div>
      </div>

      <div class="engrave-main-text">{{ mainMessage }}</div>
      <div class="engrave-sub-text">{{ subMessage }}</div>
      <div class="engrave-status-text"></div>
    </div>
  </div>
</div>
