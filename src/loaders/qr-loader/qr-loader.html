<div class="loader-overlay">
  <div class="scene-container">

      <div class="scanner-gun">
          <div class="status-light"></div>
          <div class="gun-body"></div>
          <div class="gun-handle"></div>
          <div class="gun-trigger"></div>
          <div class="laser-fan"></div>
      </div>

      <div class="qr-card">
          <div class="qr-pattern">
              <div class="qr-marker tl"></div>
              <div class="qr-marker tr"></div>
              <div class="qr-marker bl"></div>
          </div>
          <div class="scan-line"></div>
      </div>

  </div>

  <div class="text-container">
      <div class="main-text">{{ mainMessage }}<span class="dots"></span></div>
      <div class="sub-text">{{ subMessage }}</div>
  </div>
</div>
