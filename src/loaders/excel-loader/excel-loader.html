<div class="loader-overlay">
  <div class="loader-card">
    <div class="loader-shell">
      <div class="upload-wrapper">
        <div class="excel-source" aria-hidden="true">XLS</div>

        <div class="binary-stream" aria-hidden="true">
          <div class="digit d1"></div>
          <div class="digit d2"></div>
          <div class="digit d3"></div>
          <div class="digit d4"></div>
          <div class="digit d5"></div>
        </div>

        <div class="server-dest" aria-hidden="true">
          <div class="led-row l1"></div>
          <div class="led-row l2"></div>
          <div class="led-row l3"></div>
        </div>
      </div>

      <div class="status-block">
        <div class="status-text">{{ mainMessage }}</div>
        <div class="sub-text">{{ subMessage }}</div>
      </div>
    </div>
  </div>
</div>
