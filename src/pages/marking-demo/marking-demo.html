<div class="main-container" [formGroup]="form">

  <div class="left-section">

    <div class="form-row">
      <label>Model No</label>
      <input type="text" class="full-width" formControlName="modelNo">
    </div>
    <div class="form-row">
      <label>Description</label>
      <input type="text" class="full-width" formControlName="description">
    </div>
    <div class="form-row">
      <label>Description 1</label>
      <input type="text" class="full-width" formControlName="description1">
    </div>

    <div class="grid-fields">
      <label>Market</label>
      <input type="text" formControlName="market">

      <label class="text-right">Country</label>
      <select formControlName="country">
        <option value="INDIA">INDIA</option>
      </select>

      <label>Drive Type</label>
      <input type="text" formControlName="driveType">

      <label class="text-right">Trim</label>
      <input type="text" formControlName="trim">

      <label>FLW</label>
      <input type="text" formControlName="flw">

      <label class="text-right">GVW</label>
      <input type="text" formControlName="gvw">

      <label>FAW</label>
      <input type="text" formControlName="faw">

      <label class="text-right">RAW</label>
      <input type="text" formControlName="raw">

      <label>Seat Code</label>
      <input type="text" formControlName="seatCode">

      <label class="text-right">Color</label>
      <input type="text" formControlName="color">

      <label>Engine</label>
      <input type="text" formControlName="engine">

      <label class="text-right">BS Stage</label>
      <input type="text" formControlName="bsStage">

      <label>Batch No</label>
      <input type="text" formControlName="batchNo">

      <label class="text-right">Date</label>
      <input type="date" formControlName="date">
    </div>

    <div class="form-row mt-2">
      <label>VIN No</label>
      <input type="text" class="full-width highlight-input" formControlName="vinNo">
    </div>

    <div class="form-row mt-2">
      <label>Engine Sr No</label>
      <input type="text" class="full-width" formControlName="engineSrNo">
    </div>

    <fieldset class="cng-group">
      <legend>CNG Data</legend>
      <div class="cng-grid">
        <div class="cng-fields">
          <div class="row">
            <label>CNG Tank Id</label>
            <input type="text" formControlName="cngTankId">
          </div>
          <div class="row">
            <label>Dt. Of Install</label>
            <input type="date" formControlName="cngInstallDate">
          </div>
          <div class="row">
            <label>Dt. Of. Last Retest</label>
            <input type="date" formControlName="cngRetestDate">
          </div>
          <div class="row">
            <label>Water Capacity</label>
            <input type="text" formControlName="waterCapacity">
          </div>
          <div class="row">
            <label>VIN(Last 8 Chars)</label>
            <input type="text" formControlName="vinLast8">
          </div>
        </div>

        <div class="sticker-select">
          <p>Select Sticker</p>
          <label>
            <input type="radio" value="vin" formControlName="sticker"> VIN
          </label>
          <label>
            <input type="radio" value="sell" formControlName="sticker"> Sell
          </label>
          <label>
            <input type="radio" value="both" formControlName="sticker"> Both
          </label>
        </div>
      </div>
    </fieldset>

    <div class="action-buttons">
       <button class="btn-green">Print</button>
       <button class="btn-blue">Engrave</button>
       <button class="btn-red">Abort</button>
    </div>

  </div>

  <div class="right-section">
    <div class="display-box large-box">
      </div>

    <div class="bottom-panels">
      <div class="display-box medium-box">
        </div>
      <div class="display-box small-box">
        </div>
    </div>
  </div>
</div>
