<div class="page">
  <app-login-loader *ngIf="(loading$ | async) ?? false" message="Authenticating Credentials"></app-login-loader>

  <main class="content">
    <section class="hero">
      <div class="hero-brand">
        <img class="logo" src="NewMahindraLogo-compact.png" alt="Mahindra" />
        <div class="brand-text">
          <div class="title">Mahindra VIN Marking</div>
          <div class="sub">Plant Authentication Gateway</div>
        </div>
      </div>
    </section>

    <mat-card class="card" appearance="outlined">
      <div class="card-head">
        <div class="card-title">Sign In</div>
        <div class="chip">Authorized Access</div>
      </div>

      <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Username</mat-label>
          <input matInput type="text" formControlName="username" autocomplete="username" />
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="username.touched && username.invalid">
            <span *ngIf="username.errors?.['required']">Username is required</span>
            <span *ngIf="username.errors?.['username']">Enter valid username</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Password</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
            <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="password.touched && password.invalid">
            <span *ngIf="password.errors?.['required']">Password is required</span>
            <span *ngIf="password.errors?.['minlength']">Minimum 4 characters</span>
          </mat-error>
        </mat-form-field>

        <button mat-raised-button class="btn" type="submit" [disabled]="(loading$ | async) ?? false">
          <span *ngIf="!((loading$ | async) ?? false)">Sign In</span>
          <span *ngIf="(loading$ | async) ?? false" class="loading">Signing in...</span>
        </button>

        <div class="footer">
          <span class="muted">Need access assistance?</span>
          <span class="muted">Contact Supervisor / IT Desk</span>
        </div>
      </form>
    </mat-card>
  </main>
</div>
