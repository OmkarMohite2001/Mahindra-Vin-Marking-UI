<mat-sidenav-container class="shell">
  <!-- Sidebar -->
  <mat-sidenav class="side" mode="side" opened>
    <div class="side-inner">
      <div class="side-logo">
        <img src="NewMahindraLogo-compact.png" alt="Mahindra" />
      </div>

      <nav class="nav">
        <a
          class="nav-link"
          *ngFor="let item of visibleNavItems; trackBy: trackByNavPath"
          [routerLink]="[item.path]"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <div class="nav-item-content">
            @if (getNavImageSrc(item); as navImage) {
              <img class="nav-img" [src]="navImage" [alt]="item.label" />
            } @else {
              <mat-icon class="nav-ic">{{ item.icon }}</mat-icon>
            }
            <div class="nav-title">{{ item.label }}</div>
          </div>
        </a>

        <mat-divider></mat-divider>

        <a (click)="logout()" class="logout-row">
          <!-- <div class="logout-avatar">{{ loggedInInitial }}</div> -->

          <div class="logout-left">
            <div class="logout-copy">
              <div class="logout-welcome">WELCOME</div>
              <div class="logout-user">{{ loggedInUserName }}</div>
            </div>
            <div class="logout-action">
              <img class="logout-img" [src]="logoutImageSrc" alt="Logout" />
            </div>
          </div>

        </a>
      </nav>
    </div>
  </mat-sidenav>

  <!-- Main -->
  <mat-sidenav-content class="main">
    <!-- Top menu -->
    <mat-toolbar class="topmenu">
      <button mat-button [matMenuTriggerFor]="adminMenu">Admin</button>
      <button mat-button [matMenuTriggerFor]="maintMenu">Maintenance</button>
      <button mat-button [matMenuTriggerFor]="assocMenu">Associate</button>
      <button mat-button [routerLink]="['/app/reports']">Reports</button>
      <button mat-button [matMenuTriggerFor]="helpMenu">Help</button>
      <span class="spacer"></span>
      <button mat-button (click)="logout()">Exit</button>
    </mat-toolbar>

    <mat-menu #adminMenu="matMenu">
      <button mat-menu-item [routerLink]="['/app/user-management']">Users Master</button>
      <button mat-menu-item>Color Master</button>
      <button mat-menu-item>Country Master</button>
      <button mat-menu-item>Trim Master</button>
      <button mat-menu-item>Model Master</button>
      <button mat-menu-item [routerLink]="['/app/re-engrave']">Reprint</button>
      <button mat-menu-item>Manage Batch No</button>
      <button mat-menu-item>Email Recipients</button>
    </mat-menu>

    <mat-menu #maintMenu="matMenu">
      <button mat-menu-item [routerLink]="['/app/excel-upload']">Upload Data</button>
      <button mat-menu-item [routerLink]="['/app/settings']">Settings</button>
    </mat-menu>

    <mat-menu #assocMenu="matMenu">
      <button mat-menu-item [routerLink]="['/app/marking']">Marking Cycle</button>
    </mat-menu>

    <mat-menu #helpMenu="matMenu">
      <button mat-menu-item [routerLink]="['/app/about']">About</button>
      <button mat-menu-item *ngIf="loggedInRole === 'Admin'" [routerLink]="['/app/serialTerminal']">
        Serial Terminal
      </button>
      <button mat-menu-item>Support</button>
    </mat-menu>

    <!-- Header strip -->
    <div class="header-strip">
      <div class="header-left">
        <img class="mini-logo" src="NewMahindraLogo-compact.png" alt="Logo" />
      </div>

      <div class="header-title">MARKING CYCLE</div>

      <div class="header-right">
        <img class="mini-logo" src="NewMahindraLogo-compact.png" alt="Company" />
      </div>
    </div>

    <!-- ✅ VERY IMPORTANT -->
    <div class="workarea">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
