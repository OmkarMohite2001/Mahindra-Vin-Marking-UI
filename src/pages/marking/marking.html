<div class="marking-page">
  <!-- TOP BAR -->

    <div class="brand-left">
      <img class="logo" src="assets/mahindra.png" alt="Mahindra" />

  <!-- MAIN -->
  <div class="main">
    <!-- LEFT FORM PANEL -->
    <div class="left-panel">
      <!-- Upper Form -->
      <div class="card form-card">
        <div class="grid-2">
          <!-- LEFT COLUMN LABELS -->
          <div class="col">
            <div class="field">
              <label>Model No</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Description</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Description 1</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Market</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Drive Type</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>FLW</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>FAW</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Seat Code</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Engine</label>
              <input type="text" />
            </div>
          </div>

          <!-- RIGHT COLUMN LABELS -->
          <div class="col">
            <div class="field">
              <label>Country</label>
              <select>
                <option>INDIA</option>
                <option>SA</option>
                <option>AUS</option>
              </select>
            </div>

            <div class="field">
              <label>Trim</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>GVW</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>RAW</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Color</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>BS Stage</label>
              <input type="text" />
            </div>

            <div class="field">
              <label>Date</label>
              <input type="text" />
            </div>
          </div>
        </div>

        <div class="field wide">
          <label>Batch No</label>
          <input type="text" value="700071" />
        </div>

        <div class="field wide">
          <label>VIN No</label>
          <input type="text" />
        </div>
      </div>

      <!-- Engine Sr No Block -->
      <div class="card engine-card">
        <div class="engine-title">Engine Sr No</div>

        <div class="engine-grid">
          <div class="engine-left">
            <div class="field compact">
              <label>CNG Date</label>
              <input type="text" />
            </div>

            <div class="field compact">
              <label>CNG Tank Id</label>
              <input type="text" />
            </div>

            <div class="field compact">
              <label>Dt. Of Install</label>
              <input type="text" />
            </div>

            <div class="field compact">
              <label>Dt. Of Last Retest</label>
              <input type="text" />
            </div>

            <div class="field compact">
              <label>Water Capacity</label>
              <input type="text" />
            </div>

            <div class="field compact">
              <label>VIN (Last 8 Chars)</label>
              <input type="text" />
            </div>
          </div>

          <div class="engine-right">
            <div class="sticker-title">Select Sticker</div>
            <label class="radio">
              <input type="radio" name="sticker" checked />
              <span>VIN</span>
            </label>
            <label class="radio">
              <input type="radio" name="sticker" />
              <span>Sell</span>
            </label>
            <label class="radio">
              <input type="radio" name="sticker" />
              <span>Both</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Bottom Buttons -->
      <div class="btn-row">
        <button class="btn soft">Preview</button>
        <button class="btn soft">Print</button>
        <button class="btn primary">Engrave</button>
        <button class="btn danger">Abort</button>
      </div>
    </div>

    <!-- RIGHT PREVIEW AREA (EMPTY DIVS) -->
    <div class="right-panel">
      <div class="preview big"></div>

      <div class="preview-row">
        <div class="preview mid"></div>
        <div class="preview small"></div>
      </div>
    </div>
  </div>
</div>
