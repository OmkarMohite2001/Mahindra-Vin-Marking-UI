<div class="reports-page">
  <app-table-convert-loader
    *ngIf="isReportLoaderVisible"
    [mainMessage]="reportLoaderMainMessage"
    [subMessage]="reportLoaderSubMessage"
  />

  <mat-card class="hero">
    <div class="hero-head">
      <h1>Production Data Report</h1>

      <div class="hero-actions">
        <mat-form-field appearance="outline" class="range-field">
          <mat-label>Date Filter</mat-label>
          <mat-select [value]="selectedDatePreset" (valueChange)="onDatePresetChange($event)">
            <mat-option value="none">No Filter</mat-option>
            <mat-option value="1d">1 Day</mat-option>
            <mat-option value="7d">7 Days</mat-option>
            <mat-option value="1m">1 Month</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="range-field shift-field">
          <mat-label>Shift</mat-label>
          <mat-select [value]="selectedShift" (valueChange)="onShiftChange($event)">
            <mat-option value="all">All</mat-option>
            <mat-option value="A">A</mat-option>
            <mat-option value="B">B</mat-option>
            <mat-option value="C">C</mat-option>
          </mat-select>
        </mat-form-field>

        <label class="manual-date-field">
          <span>From</span>
          <input type="date" [value]="fromDate" (change)="onFromDateChange($any($event.target).value)" />
        </label>

        <label class="manual-date-field">
          <span>To</span>
          <input type="date" [value]="toDate" (change)="onToDateChange($any($event.target).value)" />
        </label>

        <button mat-stroked-button type="button" (click)="loadReports()" [disabled]="loading">
          <mat-icon>refresh</mat-icon>
          Refresh
        </button>
        <button mat-raised-button color="primary" type="button" (click)="downloadExcel()" [disabled]="loading || !filteredRecords.length">
          <mat-icon>download</mat-icon>
          Download Excel
        </button>
      </div>
    </div>

  </mat-card>

  <mat-card class="table-card">
    <div class="table-meta">
      <span>Total Records: {{ filteredRecords.length }}</span>
      <div class="meta-chips">
        <span *ngIf="selectedShift !== 'all'" class="range-chip">
          Shift: {{ selectedShift }}
        </span>
        <span *ngIf="activeDateRangeLabel" class="range-chip">
          {{ activeDateRangeLabel }}
        </span>
      </div>
    </div>

    <div class="table-wrap" *ngIf="filteredRecords.length; else emptyState">
      <table mat-table [dataSource]="filteredRecords" class="report-table">
        <ng-container *ngFor="let column of displayedColumns; trackBy: trackByColumn" [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef [ngClass]="'col-' + column">
            {{ headerLabel(column) }}
          </th>
          <td mat-cell *matCellDef="let row" [ngClass]="'col-' + column">
            <span class="cell-text" [title]="displayCell(column, row)">{{ displayCell(column, row) }}</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackBySequenceId"></tr>
      </table>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">No production report data available for the selected filters.</div>
    </ng-template>
  </mat-card>
</div>
